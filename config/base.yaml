    pca_components: 0.99
    standardize: true

clustering:
    mode: "distance_optics"
    distance_method: "pc_distance"
    formation_months: 36
    pca_components_distance: 5
    optics_min_samples: 2
    optics_xi: 0.05
    optics_min_cluster_size: 2
    dispersion_threshold: 0.02
    distance_metric: "euclidean"

pairs:
    max_pairs_per_cluster: 3
    hedge_lookback: 60
    zscore_lookback: 60
    entry_z: 1.8
    exit_z: 0.4

rl:
    enabled: true
    algo: "A2C"
    total_timesteps: 50000
    transaction_cost_bps: 2
    turnover_penalty: 0.001
    drawdown_penalty: 0.2
    action_reward_weight: 0.1

risk:
    max_leverage: 1.5
    vol_target: 0.1
    max_drawdown: 0.15
